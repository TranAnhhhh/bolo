    <style>
        /* --- RESET & BASIC STYLES --- */
        * {
            box-sizing: border-box;

            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- HEADER & NAVBAR --- */
        header {
            background-color: #1e293b;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #38bdf8;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #38bdf8;
        }

        /* --- MAIN CONTAINER --- */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            flex: 1;
            width: 100%;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            border-left: 4px solid #38bdf8;
            padding-left: 0.5rem;
        }

        /* --- GAME GRID --- */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .game-card {
            background-color: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.3);
        }

        .game-thumb {
            width: 100%;
            height: 150px;
            background-color: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .game-info {
            padding: 1rem;
        }

        .game-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .btn-play {
            display: inline-block;
            width: 100%;
            padding: 0.5rem;
            background-color: #0284c7;
            color: white;
            text-align: center;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-play:hover {
            background-color: #0369a1;
        }

        /* --- GAME PLAY AREA --- */
        #play-area {
            display: none;
            background-color: #1e293b;
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
        }

        .btn-close {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            float: right;
            font-weight: bold;
        }

        /* --- TIC TAC TOE GAME STYLES --- */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 5px;
            justify-content: center;
            margin: 1.5rem auto;
        }

        .cell {
            width: 100px;
            height: 100px;
            background-color: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
        }

        .cell:hover {
            background-color: #475569;
        }

        /* --- FOOTER --- */

            background-color: #1e293b;
            text-align: center;
            padding: 1rem;
            border-top: 1px solid #334155;
            color: #94a3b8;
        }
    </style>

        const playArea = document.getElementById('play-area');
        const customGameContainer = document.getElementById('custom-game-container');

            playArea.style.display = 'block';

        // Hàm đóng game
        function closeGame() {
            playArea.style.display = 'none';
            gameIframe.src = "";
        }

        /* --- LOGIC GAME TIC TAC TOE --- */
        let currentPlayer = 'X';
        let boardState = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Hàng ngang
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Hàng dọc
            [0, 4, 8], [2, 4, 6]             // Đường chéo
        ];

        function makeMove(cell, index) {
            if (boardState[index] !== '' || !gameActive) return;

            boardState[index] = currentPlayer;
            cell.innerText = currentPlayer;
            cell.style.color = currentPlayer === 'X' ? '#38bdf8' : '#ef4444';

            checkResult();
        }

        function checkResult() {
            let roundWon = false;
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                document.getElementById('status-text').innerText = `Người chơi ${currentPlayer} Thắng! 🎉`;
                gameActive = false;
                return;
            }

            if (!boardState.includes('')) {
                document.getElementById('status-text').innerText = 'Hòa nhau! 🤝';
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            document.getElementById('status-text').innerText = `Lượt của: ${currentPlayer}`;
        }

        function resetTicTacToe() {
            currentPlayer = 'X';
            boardState = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            document.getElementById('status-text').innerText = `Lượt của: X`;
            document.querySelectorAll('.cell').forEach(cell => cell.innerText = '');
        }

    <!-- JAVASCRIPT ĐIỀU KHIỂN -->
    <script>
        const playArea = document.getElementById('play-area');
        const customGameContainer = document.getElementById('custom-game-container');
        const shooterGameContainer = document.getElementById('shooter-game-container');
        const iframeGameContainer = document.getElementById('iframe-game-container');
        const currentGameTitle = document.getElementById('current-game-title');
        const gameIframe = document.getElementById('game-iframe');

        function hideAllGames() {
            customGameContainer.style.display = 'none';
            shooterGameContainer.style.display = 'none';
            iframeGameContainer.style.display = 'none';
            stopShooterGame();
        }

        function playIframeGame(title, url) {
            hideAllGames();
            currentGameTitle.innerText = title;
            gameIframe.src = url;
            iframeGameContainer.style.display = 'block';
            playArea.style.display = 'block';
            playArea.scrollIntoView({ behavior: 'smooth' });
        }

        function playTicTacToe() {
            hideAllGames();
            currentGameTitle.innerText = "Cờ Caro 3x3";
            customGameContainer.style.display = 'block';
            playArea.style.display = 'block';
            resetTicTacToe();
            playArea.scrollIntoView({ behavior: 'smooth' });
        }

        function playShooterGame() {
            hideAllGames();
            currentGameTitle.innerText = "Bắn Súng Vũ Trụ 2D";
            shooterGameContainer.style.display = 'block';
            playArea.style.display = 'block';
            initShooterGame();
            playArea.scrollIntoView({ behavior: 'smooth' });
        }

        function closeGame() {
            hideAllGames();
            playArea.style.display = 'none';
            gameIframe.src = "";
        }

        /* --- LOGIC GAME TIC TAC TOE --- */
        let currentPlayer = 'X';
        let boardState = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function makeMove(cell, index) {
            if (boardState[index] !== '' || !gameActive) return;
            boardState[index] = currentPlayer;
            cell.innerText = currentPlayer;
            cell.style.color = currentPlayer === 'X' ? '#38bdf8' : '#ef4444';
            checkResult();
        }

        function checkResult() {
            let roundWon = false;
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
                    roundWon = true;
                    break;
                }
            }
            if (roundWon) {
                document.getElementById('status-text').innerText = `Người chơi ${currentPlayer} Thắng! 🎉`;
                gameActive = false;
                return;
            }
            if (!boardState.includes('')) {
                document.getElementById('status-text').innerText = 'Hòa nhau! 🤝';
                gameActive = false;
                return;
            }
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            document.getElementById('status-text').innerText = `Lượt của: ${currentPlayer}`;
        }

        function resetTicTacToe() {
            currentPlayer = 'X';
            boardState = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            document.getElementById('status-text').innerText = `Lượt của: X`;
            document.querySelectorAll('.cell').forEach(cell => cell.innerText = '');
        }

        /* --- LOGIC GAME BẮN SÚNG (MINI SHOOTER) --- */
        const canvas = document.getElementById('shooter-canvas');
        const ctx = canvas.getContext('2d');
        let shooterAnimationId;
        let shooterIntervalId;

        let player = { x: canvas.width / 2, y: canvas.height / 2, radius: 15, color: '#38bdf8' };
        let bullets = [];
        let enemies = [];
        let score = 0;
        let isShooterGameOver = false;

        function initShooterGame() {
            stopShooterGame();
            score = 0;
            isShooterGameOver = false;
            document.getElementById('shooter-score').innerText = `Điểm: ${score}`;
            bullets = [];
            enemies = [];
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;

            // Lắng nghe sự kiện chuột
            canvas.addEventListener('click', shootBullet);
            
            // Tạo kẻ địch mỗi 1 giây
            shooterIntervalId = setInterval(spawnEnemy, 1000);
            
            animateShooter();
        }

        function stopShooterGame() {
            cancelAnimationFrame(shooterAnimationId);
            clearInterval(shooterIntervalId);
            canvas.removeEventListener('click', shootBullet);
        }

        function spawnEnemy() {
            if (isShooterGameOver) return;
            const radius = Math.random() * (20 - 10) + 10;
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
            }

            const angle = Math.atan2(player.y - y, player.x - x);
            const velocity = { x: Math.cos(angle) * 1.5, y: Math.sin(angle) * 1.5 };

            enemies.push({ x, y, radius, color: '#ef4444', velocity });
        }

        function shootBullet(event) {
            if (isShooterGameOver) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;

            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            const velocity = { x: Math.cos(angle) * 6, y: Math.sin(angle) * 6 };

            bullets.push({ x: player.x, y: player.y, radius: 4, color: '#facc15', velocity });
        }

        function animateShooter() {
            shooterAnimationId = requestAnimationFrame(animateShooter);
            ctx.fillStyle = 'rgba(9, 13, 22, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Vẽ người chơi
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2, false);
            ctx.fillStyle = player.color;
            ctx.fill();

            // Cập nhật đạn
            bullets.forEach((bullet, index) => {
                bullet.x += bullet.velocity.x;
                bullet.y += bullet.velocity.y;

                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = bullet.color;
                ctx.fill();

                // Xóa đạn ra khỏi màn hình
                if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                    bullets.splice(index, 1);
                }
            });

            // Cập nhật kẻ địch
            enemies.forEach((enemy, enemyIndex) => {
                enemy.x += enemy.velocity.x;
                enemy.y += enemy.velocity.y;

                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = enemy.color;
                ctx.fill();

                // Kiểm tra va chạm: Kẻ địch đụng Người chơi -> Game Over
                const distToPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distToPlayer - enemy.radius - player.radius < 1) {
                    isShooterGameOver = true;
                    stopShooterGame();
                    ctx.fillStyle = '#white';
                    ctx.font = '30px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER!', canvas.width / 2, canvas.height / 2);
                }

                // Kiểm tra va chạm: Đạn trúng Kẻ địch
                bullets.forEach((bullet, bulletIndex) => {
                    const distToBullet = Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y);
                    if (distToBullet - enemy.radius - bullet.radius < 1) {
                        setTimeout(() => {
                            enemies.splice(enemyIndex, 1);
                            bullets.splice(bulletIndex, 1);
                            score += 100;
                            document.getElementById('shooter-score').innerText = `Điểm: ${score}`;
                        }, 0);
                    }
                });
            });
        }        
    </script>
</body>
</html>
